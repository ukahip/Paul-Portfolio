name: Sync Notion to GitHub

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour — adjust as needed
  workflow_dispatch:        # Allows manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Required to push commits

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install @notionhq/client notion-to-md

      - name: Run Notion sync script
        run: node sync.js
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}

      - name: Commit and push changes
        run: |
          git config user.email "notion-sync-bot@github.com"
          git config user.name "Notion Sync Bot"
          git add docs/
          git diff --staged --quiet || (git commit -m "chore: sync Notion docs [$(date -u '+%Y-%m-%d %H:%M UTC')]" && git push)
